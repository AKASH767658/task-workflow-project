{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h1>Create New Task</h1>
    <form method="POST" action="{{ url_for('create_task') }}">

        <div class="form-group">
            <label>Task Title *</label>
            <input type="text" name="title" placeholder="Enter task title" required>
        </div>

        <div class="form-group">
            <label>Description *</label>
            <textarea name="description" placeholder="Describe the task" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Priority *</label>
            <select name="priority" required>
                <option value="">Select Priority</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label>Assignee *</label>
            <input type="text" name="assignee" placeholder="Assignee name" required>
        </div>

        <div class="form-group">
            <label>Reviewer *</label>
            <input type="text" name="reviewer" placeholder="Reviewer name (cannot be same as assignee)" required>
        </div>

        <div class="form-group">
            <label>Due Date *</label>
            <input type="date" name="due_date" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create Task</button>
        <a href="{{ url_for('all_tasks') }}" class="btn btn-secondary btn-full" style="margin-top:8px; display:block; text-align:center;">Cancel</a>
    </form>
</div>
{% endblock %}
